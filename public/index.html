<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>随机祝福</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app" class="app hidden">
    <div class="bg-gradient"></div>
    <div class="bg-orbs">
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
    </div>
    <div class="particles" id="particles"></div>

    <main class="stage">
      <section class="hero">
        <div class="mascot-spotlight" aria-hidden="true"></div>
        <div class="mascot-video-wrap">
          <video
            id="mascot-video"
            class="mascot-video-source"
            width="720"
            height="720"
            autoplay
            muted
            loop
            playsinline
            webkit-playsinline
            disablePictureInPicture
            preload="auto"
            src="/videos/mascot-bull.mp4"
          ></video>
          <canvas id="mascot-canvas" class="mascot-canvas" width="720" height="720" aria-label="牛小邮"></canvas>
        </div>
        <div class="mascot-ground" aria-hidden="true"></div>
      </section>

      <section class="copy-block">
        <p class="greeting" id="greeting">送你一句小小祝福</p>
        <p class="intro" id="intro">愿这份随机好运，刚好落在今天</p>
      </section>

      <section class="card" id="blessing-card">
        <p class="blessing" id="blessing-content"></p>
      </section>

      <button type="button" class="refresh-btn" id="refresh-btn">再抽一条 ✨</button>
    </main>
  </div>

  <div id="loading" class="loading">
    <div class="loading-video-wrap">
      <video
        id="loading-video"
        class="mascot-video-source"
        width="120"
        height="120"
        autoplay
        muted
        loop
        playsinline
        webkit-playsinline
        preload="auto"
        src="/videos/mascot-bull.mp4"
      ></video>
      <canvas id="loading-canvas" class="loading-canvas" width="720" height="720"></canvas>
    </div>
    <p id="loading-text">牛小邮正在准备祝福...</p>
  </div>

  <div id="error" class="error hidden">
    <p>加载失败，请刷新重试</p>
  </div>

  <script src="/js/app.js?v=15"></script>
</body>
</html>
